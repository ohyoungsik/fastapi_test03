<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>새글 작성 - 게시판</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .form-container { max-width: 700px; margin-top: 50px; }
    </style>
</head>
<body>

<div class="container form-container">
    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0">새글 작성하기</h4>
        </div>
        <div class="card-body p-4">
            <form action="/post/new" method="post">
                
                <div class="mb-3">
                    <label for="writer" class="form-label fw-bold">작성자</label>
                    <input type="text" name="writer" id="writer" class="form-control" placeholder="이름을 입력하세요" required>
                </div>

                <div class="mb-3">
                    <label for="title" class="form-label fw-bold">제목</label>
                    <input type="text" name="title" id="title" class="form-control" placeholder="글 제목을 입력하세요" required>
                </div>

                <div class="mb-4">
                    <label for="content" class="form-label fw-bold">내용</label>
                    <textarea name="content" id="content" class="form-control" rows="10" placeholder="내용을 자유롭게 작성하세요" required></textarea>
                </div>

                <div class="d-flex justify-content-end gap-2">
                    <a href="/post" class="btn btn-outline-secondary">취소</a>
                    <button type="submit" class="btn btn-primary px-4">저장하기</button>
                </div>

            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
