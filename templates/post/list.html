<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게시글 목록</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .container { max-width: 1000px; margin-top: 50px; }
        .table shadow-sm { background-color: white; }
        /* 제목 줄바꿈 방지 및 말줄임표 처리 */
        .text-truncate-custom {
            max-width: 250px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold text-dark">📋 게시글 목록</h2>
        <a href="/post/new" class="btn btn-primary shadow-sm">+ 새 글 쓰기</a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th class="text-center" style="width: 80px;">번호</th>
                        <th style="width: 300px;">제목</th>
                        <th style="width: 120px;">작성자</th>
                        <th>내용</th>
                        <th style="width: 180px;">작성일</th>
                        <th style="width: 100px;">수정</th>
                        <th class="text-center" style="width: 100px;">관리</th>
                    </tr>
                </thead>
                <tbody>
                    {% for post in posts %}
                    <tr class="align-middle">
                        <td class="text-center text-muted">{{ post.num }}</td>
                        <td>
                            <a href="/post/{{ post.num }}" class="text-decoration-none fw-bold text-primary">
                                {{ post.title }}
                            </a>
                        </td>
                        <td><span class="badge bg-light text-dark border">{{ post.writer }}</span></td>
                        <td>
                            <div class="text-truncate-custom text-muted small">
                                {{ post.content }}
                            </div>
                        </td>
                        <td class="small text-secondary">{{ post.created_at }}</td>
                        <td class="text-center">
                            <button 
                                type="button"
                                class="btn btn-warning"
                                data-num="{{ post.num }}"
                                data-title="{{ post.title }}"
                                data-content="{{ post.content }}"
                                onclick="openEditModal(this)">
                                 수정
                                </button>
                        </td>
                        <td class="text-center">
                            <button class="btn btn-outline-danger btn-sm" onclick="deletePost({{ post.num }})">
                                삭제
                            </button>
                        </td>
                    </tr>
                    {% endfor %}
                    {% if not posts %}
                    <tr>
                        <td colspan="6" class="text-center py-5 text-muted">등록된 게시글이 없습니다.</td>
                    </tr>
                    {% endif %}
                </tbody>
            </table>
        </div>
    </div>

    <div class="mt-4 text-center">
        <a href="/" class="text-decoration-none text-secondary small">🏠 홈으로 돌아가기</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
function openEditModal(num, title, content) {
    const targetNum = button.dataset.num;
    const targetTitle = button.dataset.title;
    const targetContent = button.dataset.content;

    console.log("데이터 확인:", num, title, content); // 브라우저 콘솔에서 확인용

    const numEl = document.getElementById("edit-num");
    const titleEl = document.getElementById("edit-title");
    const contentEl = document.getElementById("edit-content");

    if (numEl && titleEl && contentEl) {
        numEl.value = targetNum;
        titleEl.value = targetTitle;
        contentEl.value = targetContent;

        const modal = bootstrap.Modal.getOrCreateInstance(document.getElementById('editModal'));
        modal.show();
    } else {
        console.error("모달 요소를 찾을 수 없습니다. edit-modal.html 파일이 include 되었는지 확인하세요.");
    }
}
</script>

<script>
function deletePost(num) {
    if (!confirm("정말 삭제하시겠습니까?")) return;

    fetch(`/post/delete/${num}`, {
        method: "DELETE"
    })
    .then(response => response.json())
    .then(data => {
        alert(data.message);
        location.reload(); 
    })
    .catch(error => {
        console.error("에러:", error);
        alert("삭제 실패");
    });
}
</script>
{% include 'post/edit-modal.html' %}
</body>
</html>
