<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>상세보기 - {{ post.title }}</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-sm">

                <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                    <h4 class="mb-0">글 상세보기</h4>
                    <span class="badge bg-light text-primary">No. {{ post.num }}</span>
                </div>

                <div class="card-body">
                    <h2 class="card-title border-bottom pb-3">{{ post.title }}</h2>

                    <div class="mb-4 text-muted small d-flex justify-content-between">
                        <span><strong>작성자:</strong> {{ post.writer }}</span>
                        <span><strong>작성일:</strong> {{ post.created_at }}</span>
                    </div>

                    <div class="mb-4" style="min-height: 200px; white-space: pre-wrap;">
                        {{ post.content }}
                    </div>
                </div>

                <div class="card-footer bg-white text-end">
                    <a href="/post" class="btn btn-secondary">목록으로</a>
                    <button 
                        type="button"
                        class="btn btn-warning"
                        data-num="{{ post.num }}"
                        data-title="{{ post.title }}"
                        data-content="{{ post.content }}"
                        onclick="openEditModal(this)">
                        수정하기
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
function openEditModal(num, title, content) {
    const targetNum = button.dataset.num;
    const targetTitle = button.dataset.title;
    const targetContent = button.dataset.content;

    console.log("데이터 확인:", num, title, content); // 브라우저 콘솔에서 확인용

    const numEl = document.getElementById("edit-num");
    const titleEl = document.getElementById("edit-title");
    const contentEl = document.getElementById("edit-content");

    if (numEl && titleEl && contentEl) {
        numEl.value = targetNum;
        titleEl.value = targetTitle;
        contentEl.value = targetContent;

        const modal = bootstrap.Modal.getOrCreateInstance(document.getElementById('editModal'));
        modal.show();
    } else {
        console.error("모달 요소를 찾을 수 없습니다. edit-modal.html 파일이 include 되었는지 확인하세요.");
    }
}
</script>
{% include 'post/edit-modal.html' %}
</body>
</html>
