<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>상세보기 - {{ post.title }}</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card shadow-sm">
                    <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                        <h4 class="mb-0">글 상세보기</h4>
                        <span class="badge bg-light text-primary">No. {{ post.num }}</span>
                    </div>
                    <div class="card-body">
                        <h2 class="card-title border-bottom pb-3">{{ post.title }}</h2>
                        
                        <div class="mb-4 text-muted small d-flex justify-content-between">
                            <span><strong>작성자:</strong> {{ post.writer }}</span>
                            <span><strong>작성일:</strong> {{ post.created_at }}</span>
                        </div>

                        <div class="mb-4" style="min-height: 200px; white-space: pre-wrap;">
                            {{ post.content }}
                        </div>
                    </div>
                    <div class="card-footer bg-white text-end">
                        <a href="/post" class="btn btn-secondary">목록으로</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS (optional) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
